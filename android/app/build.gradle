plugins {
    id "com.android.application"
    id "kotlin-android"
    // Este plugin substitui o antigo 'apply from'
    id "dev.flutter.flutter-gradle-plugin" 
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

android {
    namespace "com.example.myapp"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.myapp"
        minSdk 24
        targetSdk 35
        versionCode localProperties.getProperty('flutter.versionCode')?.toInteger() ?: 1
        versionName localProperties.getProperty('flutter.versionName') ?: "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// --- REMOVA A LINHA 'apply from' QUE ESTAVA AQUI ---

dependencies {
    // REMOVA as linhas de 'implementation files(...flutter.jar)'
    // O plugin do Flutter já faz isso automaticamente. 
    // Colocar manualmente gera conflitos de duplicidade.
    
    implementation "androidx.core:core-ktx:1.13.1"
}
